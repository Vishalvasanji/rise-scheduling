# Render Blueprint — must live at the repository ROOT so Render can find it.
# FastAPI backend (API + MCP-capable) for the RISE Schedule Hub pilot. Docker so
# the same container runs locally and on Render, and later lifts to Azure (SCOPE
# §8). Set the secret env vars in the Render dashboard (sync: false) — never
# commit them. Paths are relative to the repo root.
services:
  - type: web
    name: rise-schedule-hub-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      # Turso (libSQL) connection URL, including the auth token, e.g.
      # sqlite+libsql://<db-host>/?authToken=<token>&secure=true
      - key: DATABASE_URL
        sync: false
      # Random secret for pilot JWT signing.
      - key: AUTH_SECRET
        sync: false
      # The deployed Vercel origin (comma-separated list allowed), e.g.
      # https://rise-scheduling.vercel.app
      - key: FRONTEND_ORIGIN
        sync: false
      - key: PILOT_ANCHOR_DATE
        value: "2026-06-22"

  # MCP server (Claude chat connector) — Streamable HTTP at /mcp. Same image and
  # service layer as the API, so chat writes go through the same engine + audit
  # path. /health is a cheap no-DB liveness route (/mcp itself refuses a plain GET).
  # DB is migrated/seeded by the API service.
  - type: web
    name: rise-schedule-hub-mcp
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: python -m app.mcp.server --http
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PILOT_ANCHOR_DATE
        value: "2026-06-22"
